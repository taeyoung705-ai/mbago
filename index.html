<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#2d4ec8">
<meta name="robots" content="noindex, nofollow, noarchive, nosnippet, noimageindex">
<meta name="googlebot" content="noindex, nofollow">
<title>엠바고 — MBA-GO</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" rel="stylesheet">
<style>
:root{
  --brand:#2d4ec8;        /* 포인트 컬러 (학교 상징색으로 교체 가능) */
  --brand-soft:#eaeefc;
  --brand-dark:#1f3795;
  --accent:#f3a712;
  --bg:#f5f6f9;
  --card:#ffffff;
  --text:#1a1d28;
  --muted:#7a8194;
  --line:#eceef3;
  --danger:#e2483d;
  --ok:#1ca672;
  --shadow:0 4px 16px rgba(24,33,77,.08);
  --shadow-lg:0 12px 40px rgba(24,33,77,.18);
  --maxw:480px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;}
body{
  font-family:'Pretendard',-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Malgun Gothic',sans-serif;
  background:#e9ebf1;color:var(--text);
  -webkit-font-smoothing:antialiased;
}
.app{
  max-width:var(--maxw);margin:0 auto;min-height:100vh;background:var(--bg);
  position:relative;display:flex;flex-direction:column;
  box-shadow:0 0 40px rgba(0,0,0,.06);overflow:hidden;
}
/* ===== Header ===== */
.appbar{
  position:sticky;top:0;z-index:30;
  background:linear-gradient(135deg,var(--brand),var(--brand-dark));
  color:#fff;padding:16px 18px 14px;
}
.appbar .logo{display:flex;align-items:center;gap:9px;}
.appbar .logo .mark{
  width:30px;height:30px;border-radius:9px;background:#fff;color:var(--brand);
  display:grid;place-items:center;font-weight:800;font-size:15px;letter-spacing:-.5px;
}
.appbar .logo b{font-size:19px;font-weight:800;letter-spacing:-.5px;}
.appbar .logo small{font-size:11px;opacity:.8;font-weight:500;margin-left:2px;}
.appbar .sub{font-size:12px;opacity:.85;margin-top:7px;font-weight:400;}
/* ===== Tab content area ===== */
.screen{flex:1;overflow-y:auto;padding-bottom:78px;}
.tab-page{display:none;animation:fade .25s ease;}
.tab-page.active{display:block;}
@keyframes fade{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}
.section-pad{padding:16px;}
.page-title{font-size:18px;font-weight:800;margin:4px 2px 14px;letter-spacing:-.4px;}
/* ===== Bottom Tab Bar ===== */
.tabbar{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:var(--maxw);
  background:#fff;border-top:1px solid var(--line);
  display:flex;z-index:40;padding:6px 4px calc(6px + env(safe-area-inset-bottom));
}
.tabbar button{
  flex:1;border:0;background:none;padding:6px 0;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--muted);
  font-family:inherit;
}
.tabbar button .ic{font-size:20px;line-height:1;}
.tabbar button .lb{font-size:11px;font-weight:600;}
.tabbar button.active{color:var(--brand);}
/* ===== Calendar ===== */
.cal-head{display:flex;align-items:center;justify-content:space-between;padding:6px 4px 14px;}
.cal-head .mtitle{font-size:18px;font-weight:800;letter-spacing:-.4px;}
.cal-head .nav{display:flex;gap:6px;}
.cal-head .nav button{
  width:34px;height:34px;border-radius:10px;border:1px solid var(--line);
  background:#fff;font-size:16px;cursor:pointer;color:var(--text);
}
.cal-grid{background:var(--card);border-radius:16px;box-shadow:var(--shadow);padding:8px 6px 10px;}
.cal-dow{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:4px;}
.cal-dow span{text-align:center;font-size:11px;font-weight:700;color:var(--muted);padding:5px 0;}
.cal-dow span:first-child{color:var(--danger);}
.cal-dow span:last-child{color:var(--brand);}
.cal-cells{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
.cal-cell{
  min-height:74px;border-radius:9px;display:flex;flex-direction:column;align-items:stretch;
  padding:4px 3px 3px;font-size:14px;cursor:pointer;position:relative;
  color:var(--text);font-weight:500;border:1.5px solid var(--line);background:#fcfcfe;overflow:hidden;
}
.cal-cell.empty{cursor:default;background:transparent;border-color:transparent;}
.cal-cell .dnum{font-size:12px;font-weight:700;text-align:center;line-height:1.4;margin-bottom:2px;color:var(--muted);}
.cal-cell.sun .dnum{color:var(--danger);}
.cal-cell.sat .dnum{color:var(--brand);}
.cal-cell.today{background:var(--brand-soft);border-color:var(--brand);}
.cal-cell.today .dnum{color:var(--brand);}
.cal-cell.sel{box-shadow:0 0 0 2px var(--brand) inset;}
.cal-evt{
  font-size:9.5px;line-height:1.25;font-weight:600;color:#fff;border-radius:4px;
  padding:1px 3px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.cal-evt.evt-수업{background:var(--brand);}
.cal-evt.evt-행사{background:var(--accent);color:#5a3d00;}
.cal-evt.evt-시험{background:var(--danger);}
.cal-evt.evt-모임{background:var(--ok);}
.cal-more{font-size:9px;font-weight:700;color:var(--muted);text-align:center;margin-top:auto;}
.cal-hint{text-align:center;color:var(--muted);font-size:12px;margin-top:12px;}
.legend{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;margin-top:14px;}
.legend span{font-size:11px;color:var(--muted);display:flex;align-items:center;gap:5px;}
.legend i{width:8px;height:8px;border-radius:50%;display:inline-block;}
/* ===== Bottom sheet ===== */
.sheet-backdrop,.modal-backdrop{
  position:fixed;inset:0;background:rgba(20,24,45,.45);z-index:50;
  opacity:0;pointer-events:none;transition:opacity .25s;
  display:flex;justify-content:center;
}
.sheet-backdrop.show,.modal-backdrop.show{opacity:1;pointer-events:auto;}
.sheet{
  position:absolute;bottom:0;width:100%;max-width:var(--maxw);
  background:#fff;border-radius:22px 22px 0 0;padding:10px 16px 28px;
  transform:translateY(100%);transition:transform .3s cubic-bezier(.22,1,.36,1);
  max-height:72vh;overflow-y:auto;
}
.sheet-backdrop.show .sheet{transform:translateY(0);}
.grip{width:42px;height:5px;border-radius:3px;background:#dcdfe8;margin:4px auto 12px;}
.sheet h3{margin:2px 2px 12px;font-size:16px;font-weight:800;}
.evt-item{
  display:flex;gap:12px;padding:13px 12px;border-radius:14px;background:var(--bg);
  margin-bottom:9px;cursor:pointer;align-items:center;border:1px solid var(--line);
}
.evt-item .time{font-size:12px;font-weight:700;color:var(--brand);min-width:46px;text-align:center;}
.evt-item .ei-body{flex:1;min-width:0;}
.evt-item .ei-title{font-weight:700;font-size:14px;}
.evt-item .ei-meta{font-size:12px;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.evt-item .chev{color:var(--muted);font-size:16px;}
.tag{display:inline-block;font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;}
.tag.수업{background:var(--brand-soft);color:var(--brand);}
.tag.행사{background:#fef0d4;color:#b9770a;}
.tag.시험{background:#fde0de;color:var(--danger);}
.tag.모임{background:#d8f3e8;color:var(--ok);}
.tag.학사{background:var(--brand-soft);color:var(--brand);}
.tag.긴급{background:#fde0de;color:var(--danger);}
.tag.일반{background:#eceef3;color:#5b6478;}
.empty-state{text-align:center;color:var(--muted);font-size:13px;padding:26px 0;}
/* ===== Modal ===== */
.modal{
  position:relative;align-self:center;margin:auto;width:calc(100% - 36px);max-width:430px;
  background:#fff;border-radius:20px;overflow:hidden;
  transform:translateY(16px) scale(.97);opacity:0;transition:all .26s cubic-bezier(.22,1,.36,1);
  max-height:84vh;display:flex;flex-direction:column;
}
.modal-backdrop.show .modal{transform:none;opacity:1;}
.modal .mhero{height:8px;background:linear-gradient(90deg,var(--brand),var(--brand-dark));}
.modal .mhero.img{height:150px;background-size:cover;background-position:center;}
.modal .mbody{padding:20px 20px 8px;overflow-y:auto;}
.modal .mclose{
  position:absolute;top:12px;right:12px;width:32px;height:32px;border-radius:50%;
  background:rgba(255,255,255,.92);border:0;font-size:17px;cursor:pointer;z-index:2;color:#444;
  box-shadow:0 2px 8px rgba(0,0,0,.12);
}
.modal h2{font-size:19px;font-weight:800;margin:8px 0 8px;letter-spacing:-.4px;line-height:1.35;}
.modal .mmeta{display:flex;flex-wrap:wrap;gap:8px 14px;color:var(--muted);font-size:13px;margin-bottom:14px;}
.modal .mmeta b{color:var(--text);font-weight:600;}
.modal .mtext{font-size:14px;line-height:1.7;color:#384055;white-space:pre-wrap;}
.modal .mrow{display:flex;gap:9px;align-items:center;font-size:13.5px;padding:9px 0;border-top:1px solid var(--line);}
.modal .mrow .k{color:var(--muted);min-width:54px;}
.modal .mrow .v{color:var(--text);font-weight:500;flex:1;}
.modal .mfoot{padding:14px 20px 20px;}
.btn{
  display:block;width:100%;text-align:center;background:var(--brand);color:#fff;border:0;
  padding:14px;border-radius:13px;font-size:15px;font-weight:700;cursor:pointer;
  text-decoration:none;font-family:inherit;
}
/* ===== Notice feed ===== */
.notice-card{
  background:var(--card);border-radius:16px;box-shadow:var(--shadow);padding:15px 16px;
  margin-bottom:12px;cursor:pointer;border:1px solid var(--line);position:relative;
}
.notice-card.pin{border:1.5px solid var(--brand);}
.notice-card .nc-top{display:flex;align-items:center;gap:8px;margin-bottom:9px;}
.notice-card .nc-date{margin-left:auto;font-size:12px;color:var(--muted);}
.notice-card .nc-title{font-size:15.5px;font-weight:800;letter-spacing:-.3px;margin-bottom:6px;line-height:1.4;}
.notice-card .nc-title .pinico{color:var(--brand);margin-right:3px;}
.notice-card .nc-prev{font-size:13.5px;color:#5e6678;line-height:1.55;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.notice-card .nc-thumb{width:100%;height:140px;border-radius:12px;margin-top:11px;background-size:cover;background-position:center;}
/* ===== Info ===== */
.chips{display:flex;gap:8px;overflow-x:auto;padding:2px 2px 14px;scrollbar-width:none;}
.chips::-webkit-scrollbar{display:none;}
.chip{
  white-space:nowrap;border:1px solid var(--line);background:#fff;color:#5b6478;
  padding:8px 15px;border-radius:22px;font-size:13.5px;font-weight:600;cursor:pointer;flex:none;font-family:inherit;
}
.chip.active{background:var(--brand);color:#fff;border-color:var(--brand);}
.info-card{
  background:var(--card);border-radius:15px;box-shadow:var(--shadow);padding:14px 15px;
  margin-bottom:11px;cursor:pointer;display:flex;gap:13px;align-items:center;border:1px solid var(--line);
}
.info-card .ic-emoji{width:46px;height:46px;border-radius:13px;background:var(--brand-soft);display:grid;place-items:center;font-size:23px;flex:none;}
.info-card .ic-body{flex:1;min-width:0;}
.info-card .ic-title{font-weight:700;font-size:14.5px;}
.info-card .ic-desc{font-size:12.5px;color:var(--muted);margin-top:3px;display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden;}
.info-card .chev{color:#c4c9d4;font-size:18px;}
/* ===== 원우(members) ===== */
.seg{display:flex;gap:6px;background:#eef0f5;padding:4px;border-radius:12px;margin-bottom:13px;}
.seg-btn{flex:1;border:0;background:none;padding:9px 0;border-radius:9px;font-size:13.5px;font-weight:700;color:var(--muted);cursor:pointer;font-family:inherit;}
.seg-btn.active{background:#fff;color:var(--brand);box-shadow:0 1px 4px rgba(24,33,77,.12);}
.seg-btn .cnt{font-size:11px;opacity:.65;font-weight:600;}
.search-wrap{position:relative;margin-bottom:12px;}
.search-input{width:100%;border:1px solid var(--line);background:#fff;border-radius:12px;padding:12px 14px 12px 38px;font-size:14px;font-family:inherit;color:var(--text);outline:none;}
.search-input:focus{border-color:var(--brand);}
.search-wrap::before{content:"\1F50D";position:absolute;left:13px;top:50%;transform:translateY(-50%);font-size:13px;opacity:.55;}
.wonu-meta{font-size:12px;color:var(--muted);margin:0 2px 10px;}
.wonu-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:9px;}
.wonu-card{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:11px 12px;box-shadow:var(--shadow);min-width:0;}
.wonu-card .wn-name{font-weight:800;font-size:14.5px;letter-spacing:-.3px;}
.wonu-card .wn-birth{font-size:10px;font-weight:700;color:var(--brand);background:var(--brand-soft);padding:2px 6px;border-radius:20px;margin-left:5px;white-space:nowrap;}
.wonu-card .wn-co{font-size:12px;color:var(--muted);margin-top:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.wonu-empty{grid-column:1/-1;text-align:center;color:var(--muted);font-size:13px;padding:30px 0;}
/* ===== Benefits ===== */
.benefit-card{
  background:var(--card);border-radius:18px;box-shadow:var(--shadow);overflow:hidden;
  margin-bottom:14px;cursor:pointer;border:1px solid var(--line);
}
.benefit-card .bc-banner{
  height:120px;background-size:cover;background-position:center;position:relative;
  display:flex;align-items:flex-end;padding:12px;
}
.benefit-card .bc-banner .bc-disc{
  background:rgba(0,0,0,.55);color:#fff;font-weight:800;font-size:13px;padding:5px 11px;border-radius:20px;backdrop-filter:blur(2px);
}
.benefit-card .bc-body{padding:13px 15px 15px;}
.benefit-card .bc-name{font-weight:800;font-size:15px;letter-spacing:-.3px;}
.benefit-card .bc-prov{font-size:12.5px;color:var(--muted);margin:3px 0 7px;}
.benefit-card .bc-sum{font-size:13px;color:#5e6678;line-height:1.5;}
.benefit-card .bc-exp{display:inline-block;margin-top:9px;font-size:11px;font-weight:700;color:var(--ok);background:#d8f3e8;padding:3px 9px;border-radius:20px;}
.note{font-size:11.5px;color:var(--muted);text-align:center;padding:6px 20px 20px;line-height:1.6;}
</style>
</head>
<body>
<div class="app">
  <header class="appbar">
    <div class="logo">
      <div class="mark">M</div>
      <b>엠바고</b><small>MBA-GO</small>
    </div>
    <div class="sub" id="appbar-sub">원우들의 학교생활을 한 곳에</div>
  </header>

  <div class="screen">
    <!-- TAB 1: CALENDAR -->
    <section class="tab-page active section-pad" id="page-cal">
      <div class="cal-head">
        <div class="mtitle" id="cal-title">2026년 6월</div>
        <div class="nav">
          <button id="cal-prev">‹</button>
          <button id="cal-next">›</button>
        </div>
      </div>
      <div class="cal-grid" id="cal-swipe">
        <div class="cal-dow"><span>일</span><span>월</span><span>화</span><span>수</span><span>목</span><span>금</span><span>토</span></div>
        <div class="cal-cells" id="cal-cells"></div>
        <div class="legend">
          <span><i style="background:var(--brand)"></i>수업</span>
          <span><i style="background:var(--accent)"></i>행사</span>
          <span><i style="background:var(--danger)"></i>시험</span>
          <span><i style="background:var(--ok)"></i>모임</span>
        </div>
      </div>
      <div class="cal-hint">날짜를 누르면 그날의 일정이 떠요 · 좌우로 밀면 달이 넘어가요</div>
    </section>

    <!-- TAB 2: NOTICES -->
    <section class="tab-page section-pad" id="page-notice">
      <div class="page-title">공지사항</div>
      <div id="notice-list"></div>
    </section>

    <!-- TAB 3: INFO -->
    <section class="tab-page section-pad" id="page-info">
      <div class="page-title">정보</div>
      <div class="seg" id="info-seg">
        <button class="seg-btn active" data-seg="wonu">원우</button>
        <button class="seg-btn" data-seg="life">생활정보</button>
      </div>
      <div id="info-wonu">
        <div class="seg" id="wonu-cohort">
          <button class="seg-btn active" data-co="17">17기<span class="cnt" id="cnt17"></span></button>
          <button class="seg-btn" data-co="18">18기<span class="cnt" id="cnt18"></span></button>
        </div>
        <div class="search-wrap">
          <input id="wonu-search" class="search-input" type="search" placeholder="이름·회사 검색" autocomplete="off">
        </div>
        <div class="wonu-meta" id="wonu-count"></div>
        <div class="wonu-grid" id="wonu-list"></div>
      </div>
      <div id="info-life" style="display:none">
        <div class="chips" id="info-chips"></div>
        <div id="info-list"></div>
      </div>
    </section>

    <!-- TAB 4: BENEFITS -->
    <section class="tab-page section-pad" id="page-benefit">
      <div class="page-title">원우 혜택</div>
      <div id="benefit-list"></div>
      <div class="note">제휴 혜택은 원우증 제시 후 이용해 주세요. 내용은 변경될 수 있어요.</div>
    </section>
  </div>

  <!-- Bottom Tab Bar -->
  <nav class="tabbar">
    <button class="active" data-tab="cal"><span class="ic">📅</span><span class="lb">캘린더</span></button>
    <button data-tab="notice"><span class="ic">📢</span><span class="lb">공지</span></button>
    <button data-tab="info"><span class="ic">ℹ️</span><span class="lb">정보</span></button>
    <button data-tab="benefit"><span class="ic">🎁</span><span class="lb">혜택</span></button>
  </nav>
</div>

<!-- Bottom Sheet (day events) -->
<div class="sheet-backdrop" id="sheet-bd">
  <div class="sheet" id="sheet">
    <div class="grip"></div>
    <h3 id="sheet-title">일정</h3>
    <div id="sheet-list"></div>
  </div>
</div>

<!-- Modal -->
<div class="modal-backdrop" id="modal-bd">
  <div class="modal" id="modal">
    <button class="mclose" id="modal-close">✕</button>
    <div id="modal-content"></div>
  </div>
</div>

<script>
/* ================= 설정 =================
   구글 시트 연동 후, 아래 API_URL 에 Apps Script 웹앱(/exec) 주소를 붙여넣으세요.
   비워두면 아래 샘플 데이터로 작동합니다. */
const CONFIG = { API_URL: "" };

/* ================= 샘플(기본) 데이터 — 시트 연동 시 자동으로 대체됩니다 ================= */
let EVENTS = [
  {date:"2026-06-18", start:"19:00", end:"22:00", title:"재무관리 3주차", cat:"수업", place:"경영관 401", desc:"사전과제(케이스 요약) 제출 필수. 강의 후 조별 토론이 있습니다.", link:""},
  {date:"2026-06-20", start:"10:00", end:"17:00", title:"기수 전체 워크숍", cat:"행사", place:"양평 리조트", desc:"1박 2일 워크숍 1일차. 셔틀버스는 학교 정문에서 오전 9시 출발합니다.", link:""},
  {date:"2026-06-25", start:"19:00", end:"21:00", title:"마케팅전략 중간고사", cat:"시험", place:"경영관 305", desc:"오픈북. 계산기 지참. A4 한 장 요약 노트 허용.", link:""},

const $=s=>document.querySelector(s);
const MONTHS=[]; // 2026-06 ~ 2026-12
for(let m=5;m<=11;m++) MONTHS.push({y:2026,m});
let curMonthIdx=0;
const TODAY="2026-06-17";

function eventsByDate(dateStr){return EVENTS.filter(e=>e.date===dateStr);}
function pad(n){return String(n).padStart(2,"0");}

/* ================= 캘린더 ================= */
function renderCalendar(){
  const {y,m}=MONTHS[curMonthIdx];
  $("#cal-title").textContent=`${y}년 ${m+1}월`;
  const first=new Date(y,m,1).getDay();
  const days=new Date(y,m+1,0).getDate();
  const cells=$("#cal-cells");cells.innerHTML="";
  for(let i=0;i<first;i++){const d=document.createElement("div");d.className="cal-cell empty";cells.appendChild(d);}
  for(let d=1;d<=days;d++){
    const dateStr=`${y}-${pad(m+1)}-${pad(d)}`;
    const dow=new Date(y,m,d).getDay();
    const cell=document.createElement("div");
    cell.className="cal-cell"+(dow===0?" sun":"")+(dow===6?" sat":"")+(dateStr===TODAY?" today":"");
    const evts=eventsByDate(dateStr).sort((a,b)=>(a.start||"").localeCompare(b.start||""));
    let blocks="";
    const SHOW=2;
    evts.slice(0,SHOW).forEach(e=>{
      blocks+=`<div class="cal-evt evt-${e.cat}">${e.title}</div>`;
    });
    if(evts.length>SHOW) blocks+=`<div class="cal-more">+${evts.length-SHOW}</div>`;
    cell.innerHTML=`<div class="dnum">${d}</div>${blocks}`;
    cell.addEventListener("click",()=>openDaySheet(dateStr,cell));
    cells.appendChild(cell);
  }
  $("#cal-prev").disabled=curMonthIdx===0;
  $("#cal-next").disabled=curMonthIdx===MONTHS.length-1;
  $("#cal-prev").style.opacity=curMonthIdx===0?.35:1;
  $("#cal-next").style.opacity=curMonthIdx===MONTHS.length-1?.35:1;
}
function changeMonth(dir){
  const n=curMonthIdx+dir;
  if(n<0||n>=MONTHS.length)return;
  curMonthIdx=n;renderCalendar();
}
$("#cal-prev").onclick=()=>changeMonth(-1);
$("#cal-next").onclick=()=>changeMonth(1);

// swipe
let tsx=0,tsy=0;
const swipeEl=$("#cal-swipe");
swipeEl.addEventListener("touchstart",e=>{tsx=e.touches[0].clientX;tsy=e.touches[0].clientY;},{passive:true});
swipeEl.addEventListener("touchend",e=>{
  const dx=e.changedTouches[0].clientX-tsx, dy=e.changedTouches[0].clientY-tsy;
  if(Math.abs(dx)>50&&Math.abs(dx)>Math.abs(dy)) changeMonth(dx<0?1:-1);
},{passive:true});

function openDaySheet(dateStr,cell){
  document.querySelectorAll(".cal-cell.sel").forEach(c=>c.classList.remove("sel"));
  if(cell) cell.classList.add("sel");
  const [y,m,d]=dateStr.split("-").map(Number);
  const dowNames=["일","월","화","수","목","금","토"];
  const dow=dowNames[new Date(y,m-1,d).getDay()];
  $("#sheet-title").textContent=`${m}월 ${d}일 (${dow}) 일정`;
  const evts=eventsByDate(dateStr).sort((a,b)=>(a.start||"").localeCompare(b.start||""));
  const list=$("#sheet-list");
  if(!evts.length){list.innerHTML='<div class="empty-state">이 날은 등록된 일정이 없어요.</div>';}
  else{
    list.innerHTML=evts.map((e,i)=>`
      <div class="evt-item" data-date="${dateStr}" data-i="${i}">
        <div class="time">${e.start||"종일"}</div>
        <div class="ei-body">
          <div class="ei-title">${e.title}</div>
          <div class="ei-meta"><span class="tag ${e.cat}">${e.cat}</span> · ${e.place||"장소 미정"}</div>
        </div>
        <div class="chev">›</div>
      </div>`).join("");
    list.querySelectorAll(".evt-item").forEach(el=>{
      el.onclick=()=>{const e=eventsByDate(el.dataset.date).sort((a,b)=>(a.start||"").localeCompare(b.start||""))[+el.dataset.i];openEventModal(e);};
    });
  }
  showSheet(true);
}

    $("#info-wonu").style.display = seg==="wonu"?"":"none";
    $("#info-life").style.display = seg==="life"?"":"none";
    $(".screen").scrollTop=0;
  });
  document.querySelectorAll("#wonu-cohort .seg-btn").forEach(b=>b.onclick=()=>{
    document.querySelectorAll("#wonu-cohort .seg-btn").forEach(x=>x.classList.toggle("active",x===b));
    wonuCohort=b.dataset.co; renderWonu(); $(".screen").scrollTop=0;
  });
  const si=$("#wonu-search");
  if(si) si.addEventListener("input",e=>{ wonuQuery=e.target.value; renderWonu(); });
}

function renderAll(){
  renderCalendar();
  renderNotices();
  renderInfoChips();
  renderInfoList();
  renderBenefits();
  renderWonu();
}
async function loadData(){
  renderAll(); // 우선 샘플/기존 데이터로 즉시 표시
  if(!CONFIG.API_URL) return; // 시트 미연동이면 샘플 유지
  try{
    const res = await fetch(CONFIG.API_URL, {cache:"no-store"});
    const d = await res.json();
    if(Array.isArray(d.events))   EVENTS   = d.events;
    if(Array.isArray(d.notices))  NOTICES  = d.notices.map(n=>({...n, pin:(n.pin===true||n.pin==="Y"||n.pin==="y"||n.pin==="TRUE"||n.pin===1)}));
    if(Array.isArray(d.info))     INFO     = d.info;
    if(Array.isArray(d.benefits)) BENEFITS = d.benefits.map(b=>({color:"#2d4ec8", ...b}));
    renderAll(); // 실데이터로 다시 렌더
  }catch(e){
    console.warn("구글 시트 불러오기 실패 — 샘플 데이터를 표시합니다.", e);
  }
}
setupWonu();
loadData();
</script>
</body>
</html>
